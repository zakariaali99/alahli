services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: alahly
      POSTGRES_USER: alahly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alahly_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alahly"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: "0.5"

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - 8000
    env_file: .env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/", "--write-out", "''", "--output", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    cpus: "2.0"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info
    mem_limit: 512m
    cpus: "1.0"

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=info
    mem_limit: 256m
    cpus: "0.5"

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./backend/deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./frontend/dist:/app/frontend/dist
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
